<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Script Loader</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f4f4f9;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            text-align: center;
            padding: 2rem;
            background: white;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        h1 {
            font-size: 1.5rem;
            margin-bottom: 1rem;
        }
        p {
            color: #666;
        }
        .status {
            margin-top: 1.5rem;
            font-size: 0.9rem;
            color: #007bff;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Background Script Loader</h1>
        <p>This page is configured to load <code>background.js</code>.</p>
        <div class="status">Check the browser console (F12) to see script output.</div>
    </div>

    <!-- Loading the requested script -->
    <script src="background.js"></script>
</body>
</html>
